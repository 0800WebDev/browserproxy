<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Browser Stream</title>
<style>
body { font-family: sans-serif; text-align: center; }
canvas { border: 1px solid black; cursor: pointer; }
</style>
</head>
<body>

<input id="url" placeholder="https://example.com" size="40">
<button onclick="go()">Go</button>
<br><br>

<canvas id="view" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("view")
const ctx = canvas.getContext("2d")

let ws

function connect() {
    ws = new WebSocket("wss://browserproxy.onrender.com")
    ws.binaryType = "blob"

    ws.onopen = () => console.log("WS connected")

    ws.onclose = () => {
        console.log("WS disconnected, reconnecting...")
        setTimeout(connect, 1000)
    }

    ws.onerror = () => ws.close()

    ws.onmessage = async (event) => {
        const img = new Image()
        img.src = URL.createObjectURL(event.data)
        img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height)
    }
}

connect()

function go() {
    let url = document.getElementById("url").value.trim()
    if (!/^https?:\/\//i.test(url)) url = "https://" + url
    ws.send(JSON.stringify({ type: "goto", url }))
}

canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect()
    ws.send(JSON.stringify({
        type: "click",
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    }))
}

canvas.onwheel = (e) => {
    ws.send(JSON.stringify({
        type: "scroll",
        deltaY: e.deltaY
    }))
    e.preventDefault()
}

document.addEventListener("keydown", (e) => {
    ws.send(JSON.stringify({ type: "keydown", key: e.key }))
})

document.addEventListener("keyup", (e) => {
    ws.send(JSON.stringify({ type: "keyup", key: e.key }))
})

document.getElementById("url").addEventListener("keydown", (e) => {
    e.stopPropagation()
})
</script>

</body>
</html>
