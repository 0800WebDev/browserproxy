<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser Proxy</title>
<style>
body { font-family: sans-serif; text-align: center; margin: 20px; }
canvas { border: 1px solid #333; cursor: pointer; }
input, button { font-size: 16px; padding: 5px 10px; margin: 5px; }
</style>
</head>
<body>

<h1>Browser Proxy</h1>
<input id="url" placeholder="https://example.com" size="50">
<button onclick="go()">Go</button>
<br><br>
<canvas id="view" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("view")
const ctx = canvas.getContext("2d")
let ws

function connect() {
    ws = new WebSocket("wss://browserproxy.onrender.com")
    ws.binaryType = "blob"

    ws.onopen = () => console.log("WS connected")
    ws.onclose = () => {
        console.log("WS disconnected, reconnecting...")
        setTimeout(connect, 1000)
    }
    ws.onerror = () => ws.close()

    ws.onmessage = async (event) => {
        const img = new Image()
        img.src = URL.createObjectURL(event.data)
        img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height)
    }
}

connect()

let lastGoto = 0
function go() {
    const now = Date.now()
    if (now - lastGoto < 2000) return // 2s cooldown
    lastGoto = now

    let url = document.getElementById("url").value.trim()
    if (!/^https?:\/\//i.test(url)) url = "https://" + url
    console.log("Sending URL:", url)
    ws.send(JSON.stringify({ type: "goto", url }))
}

// Mouse click
canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect()
    ws.send(JSON.stringify({
        type: "click",
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    }))
}

// Scroll
canvas.onwheel = (e) => {
    ws.send(JSON.stringify({ type: "scroll", deltaY: e.deltaY }))
    e.preventDefault()
}

// Keyboard
document.addEventListener("keydown", e => ws.send(JSON.stringify({ type: "keydown", key: e.key })))
document.addEventListener("keyup", e => ws.send(JSON.stringify({ type: "keyup", key: e.key })))

document.getElementById("url").addEventListener("keydown", e => e.stopPropagation())
</script>

</body>
</html>
